name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    if: ${{ !(github.event_name == 'pull_request' && (startsWith(github.head_ref, 'changeset-release/') || contains(github.event.pull_request.title, '[skip-heavy-ci]') || contains(join(github.event.pull_request.labels.*.name, ','), 'skip-heavy-ci'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check Dependency Declarations
        run: bun run check:deps

      - name: Check Publish Metadata Policy
        run: bun run check:package-metadata

      - name: Check Source Export Policy
        run: bun run check:source-exports

      - name: Check Custom Element Package Compliance
        run: bun run check:custom-elements

      - name: Check Custom Element Define Safety
        run: bun run check:ce-define-safety

      - name: Build Packages
        run: bun run build

      - name: Verify Publint Package Surface
        run: bun run check:publint

      - name: Verify Published Type Declarations (ATTW)
        run: bun run check:types-publish

      - name: Verify Published Package Exports
        run: bun run check:pack-exports

      - name: Smoke Test Packed Tarballs
        run: bun run check:pack-smoke

      - name: Verify Runtime Compatibility Boundaries
        run: bun run check:runtime-compat

      - name: Verify Node Consumer Module Imports
        run: bun run check:node-consumer-imports

      - name: Lint
        run: bun run lint:all

  build:
    name: Build
    if: ${{ !(github.event_name == 'pull_request' && (startsWith(github.head_ref, 'changeset-release/') || contains(github.event.pull_request.title, '[skip-heavy-ci]') || contains(join(github.event.pull_request.labels.*.name, ','), 'skip-heavy-ci'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check Dependency Declarations
        run: bun run check:deps

      - name: Check Publish Metadata Policy
        run: bun run check:package-metadata

      - name: Check Source Export Policy
        run: bun run check:source-exports

      - name: Check Custom Element Package Compliance
        run: bun run check:custom-elements

      - name: Check Custom Element Define Safety
        run: bun run check:ce-define-safety

      - name: Build All Packages
        run: bun run build

      - name: Run Unit Tests
        # Tests gate at PR-into-develop/master time. The release path
        # (changeset PR titled `[skip-heavy-ci]` → push: master →
        # release.yml) inherits trust from the develop merges and stays
        # fast. release.yml's manual publish run still has its own
        # `bun run test` step as a final safety net.
        if: github.event_name == 'pull_request'
        run: bun run test

      - name: Verify Runtime Compatibility Boundaries
        run: bun run check:runtime-compat

      - name: Verify Node Consumer Module Imports
        run: bun run check:node-consumer-imports

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/*/dist
          retention-days: 7

  isolated-linker-validation:
    name: Isolated Linker Validation
    if: ${{ !(github.event_name == 'pull_request' && (startsWith(github.head_ref, 'changeset-release/') || contains(github.event.pull_request.title, '[skip-heavy-ci]') || contains(join(github.event.pull_request.labels.*.name, ','), 'skip-heavy-ci'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Dependencies (isolated linker)
        run: bun install --frozen-lockfile --linker=isolated

      - name: Check Dependency Declarations
        run: bun run check:deps

      - name: Check Publish Metadata Policy
        run: bun run check:package-metadata

      - name: Check Source Export Policy
        run: bun run check:source-exports

      - name: Check Custom Element Package Compliance
        run: bun run check:custom-elements

      - name: Check Custom Element Define Safety
        run: bun run check:ce-define-safety

      - name: Build Packages
        run: bun run build

      - name: Verify Runtime Compatibility Boundaries
        run: bun run check:runtime-compat

      - name: Verify Node Consumer Module Imports
        run: bun run check:node-consumer-imports

  a11y-critical-e2e:
    name: A11y Critical E2E
    if: ${{ !(github.event_name == 'pull_request' && (startsWith(github.head_ref, 'changeset-release/') || contains(github.event.pull_request.title, '[skip-heavy-ci]') || contains(join(github.event.pull_request.labels.*.name, ','), 'skip-heavy-ci'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Skip A11y Critical E2E in CI
        run: echo "A11y critical E2E is local-only; run 'bun run test:e2e:a11y:critical' locally."

