pre-commit:
  parallel: true
  commands:
    svelte-check:
      glob: "**/*.{js,ts,svelte}"
      run: bun run check
    check-deps:
      run: bun run check:deps
    check-package-metadata:
      run: bun run check:package-metadata
    check-svelte-runtime-deps:
      run: bun run check:svelte-runtime-deps

pre-push:
  parallel: false
  commands:
    fast-local-gate:
      run: bun run verify:pre-push
